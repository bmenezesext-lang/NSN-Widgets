<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NSN — Gerador de Widgets HTML</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f4f5f7;--card:#fff;--border:#e0e3e8;--ink:#1a1a1a;--muted:#6b7280;--code-bg:#1e1e2e;--code-txt:#cdd6f4;--radius:10px}
html{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:14px;color:var(--ink);background:var(--bg)}
body{min-height:100vh}
.hdr{background:#fff;border-bottom:1px solid var(--border);padding:14px 20px 0;position:sticky;top:0;z-index:50}
.hdr-top{display:flex;align-items:baseline;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.hdr-brand{font-size:18px;font-weight:800;letter-spacing:-.5px}
.hdr-title{font-size:14px;font-weight:600;color:var(--ink)}
.site-tabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none}.site-tabs::-webkit-scrollbar{display:none}
.site-tab{padding:10px 20px;border:none;cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap;border-bottom:3px solid transparent;border-radius:8px 8px 0 0;transition:all .15s;background:transparent;color:var(--muted)}.site-tab:hover{background:#f0f0f0}.site-tab.on{border-bottom-color:currentColor}
.main{max-width:860px;margin:0 auto;padding:20px 14px 60px}
.team-bar{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;align-items:end}
.team-bar .prefix-display{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;padding:10px 12px;background:#f4f5f7;border-radius:8px;text-align:center;border:1px dashed var(--border)}
.widget-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px}
.w-tab{padding:8px 14px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-size:12px;font-weight:500;background:#fff;color:var(--muted);transition:all .12s}.w-tab:hover{border-color:#aaa}.w-tab.on{font-weight:700;color:#fff;border-color:transparent}
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px 18px}
.panel-desc{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.5}
.lbl{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px;letter-spacing:.4px;text-transform:uppercase}
.inp{width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--border);font-size:13px;font-family:inherit;background:#fafbfc;outline:none;transition:border .15s}.inp:focus{border-color:#888}
textarea.inp{resize:vertical}
.field{margin-bottom:12px}
.row{display:grid;gap:10px}.row-2{grid-template-columns:1fr 1fr}.row-3{grid-template-columns:1fr 1fr 1fr}.row-4{grid-template-columns:1fr 1fr 1fr 1fr}
.btn{padding:9px 20px;border-radius:8px;border:none;font-weight:700;font-size:13px;cursor:pointer;transition:all .15s}
.btn-copy{background:#222;color:#fff}.btn-copy:hover{background:#000}.btn-copy.ok{background:#067a00}
.btn-ghost{background:transparent;border:1px dashed var(--border);color:var(--ink);font-weight:600;font-size:12px}.btn-ghost:hover{border-color:#888}
.btn-x{background:#fee;color:#c00;padding:8px 10px;border-radius:6px;border:none;cursor:pointer;font-size:12px}
.colors{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.color-dot{width:32px;height:32px;border-radius:8px;cursor:pointer;border:3px solid transparent;transition:all .12s}.color-dot:hover{transform:scale(1.1)}.color-dot.on{border-color:var(--ink);box-shadow:0 0 0 2px #fff,0 0 0 4px var(--ink)}
.code-wrap{margin-top:16px}.code-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.code-pre{background:var(--code-bg);color:var(--code-txt);padding:14px;border-radius:var(--radius);font-size:11px;line-height:1.5;overflow:auto;max-height:300px;white-space:pre-wrap;word-break:break-all;font-family:'SF Mono',Monaco,Consolas,monospace}
.preview-lbl{margin:14px 0 8px}
.preview-box{border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:4px;background:#fafbfc}
.grid-row{display:grid;gap:8px;margin-bottom:8px}
.sep{border:none;border-top:1px solid var(--border);margin:18px 0}
.pill{padding:6px 12px;border-radius:7px;border:1px solid var(--border);cursor:pointer;font-size:12px;font-weight:500;background:#fff;color:var(--muted);transition:all .12s}.pill:hover{border-color:#888}.pill.on{color:#fff;border-color:transparent;font-weight:700}
@media(max-width:600px){.main{padding:14px 8px 40px}.panel{padding:16px 12px}.team-bar{grid-template-columns:1fr}.row-2,.row-3,.row-4{grid-template-columns:1fr}.site-tab{padding:8px 14px;font-size:12px}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.5/babel.min.js"></script>
<script type="text/babel">
const {useState}=React;
const strip=s=>s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z]/gi,"").toLowerCase();
const makePrefix=(a,b)=>(strip(a).slice(0,3)+strip(b).slice(0,3))||"prefix";
const FNT="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif";
const TC=[{n:"Vermelho",h:"#c0392b"},{n:"Azul",h:"#2980b9"},{n:"Azul Esc",h:"#1a1a4e"},{n:"Verde",h:"#006847"},{n:"Amarelo",h:"#FFD100"},{n:"Laranja",h:"#e67e22"},{n:"Branco",h:"#f0f0f0"},{n:"Preto",h:"#1a1a1a"},{n:"Grená",h:"#800020"},{n:"Celeste",h:"#6CABDD"}];
const isDk=h=>{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return(r*299+g*587+b*114)/1000<140};

function Field({label,value,onChange,placeholder,rows,style}){return<div className="field" style={style}><label className="lbl">{label}</label>{rows?<textarea className="inp" rows={rows} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}/>:<input className="inp" value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}/>}</div>}
function CopyBtn({text}){const[ok,set]=useState(false);return<button className={`btn btn-copy${ok?" ok":""}`} onClick={()=>{navigator.clipboard.writeText(text);set(true);setTimeout(()=>set(false),2000)}}>{ok?"✓ Copiado":"Copiar HTML"}</button>}
function CodeBlock({code}){return<div className="code-wrap"><div className="code-head"><span className="lbl" style={{margin:0}}>HTML gerado</span><CopyBtn text={code}/></div><pre className="code-pre">{code}</pre></div>}
function TeamBar({a,b,onA,onB,prefix}){return<div className="team-bar"><Field label="Time A (casa)" value={a} onChange={onA} placeholder="México"/><Field label="Time B (fora)" value={b} onChange={onB} placeholder="Equador"/><div><label className="lbl">Prefixo gerado</label><div className="prefix-display">{prefix}</div></div></div>}
function ColorPick({label,value,onChange}){return<div className="field"><label className="lbl">{label}</label><div className="colors">{TC.map(c=><div key={c.h} className={`color-dot${value===c.h?" on":""}`} style={{background:c.h}} title={c.n} onClick={()=>onChange(c.h)}/>)}<input className="inp" value={value} onChange={e=>onChange(e.target.value)} style={{width:90}} placeholder="#hex"/></div></div>}

/* ═══ LANCE ═══ */
function LancePalpites({p}){
  const[tips,setTips]=useState([{key:"Melhor palpite:",val:""},{key:"Dica com boas chances:",val:""},{key:"Aposta de valor:",val:""},{key:"Palpite de placar exato:",val:""}]);
  const u=(i,f,v)=>{const n=[...tips];n[i]={...n[i],[f]:v};setTips(n)};
  const html=`<style>\n.${p}{background:#e6ffe6!important;border-left:4px solid #09C400;padding:16px 20px;margin:0 0 24px;border-radius:0 6px 6px 0;font-family:${FNT};box-sizing:border-box;display:block!important;visibility:visible!important}\n.${p}-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#067a00!important;margin:0 0 10px;padding:0}\n.${p}-list{margin:0;padding:0;font-size:14px;line-height:1.9;color:#222}\n.${p}-item{display:flex;flex-wrap:wrap;gap:0 6px;margin-bottom:2px}\n.${p}-item:last-child{margin-bottom:0}\n.${p}-key{font-weight:700;flex-shrink:0}\n.${p}-val{margin:0}\n@media(max-width:480px){.${p}{padding:14px 16px}.${p}-list{font-size:13px;line-height:1.8}.${p}-title{font-size:11px}}\n</style>\n<aside class="${p}" aria-label="Palpites Rápidos" id="quick-summary" lang="pt-BR">\n<p class="${p}-title">Palpites Rápidos</p>\n<dl class="${p}-list">\n${tips.filter(t=>t.val).map(t=>`<div class="${p}-item"><dt class="${p}-key">${t.key}</dt><dd class="${p}-val">${t.val}</dd></div>`).join("\n")}\n</dl>\n</aside>`;
  return<div>
    <p className="panel-desc">Bloco verde com palpites rápidos. Estrutura dl/dt/dd.</p>
    {tips.map((t,i)=><div key={i} className="grid-row" style={{gridTemplateColumns:"180px 1fr auto"}}><input className="inp" value={t.key} onChange={e=>u(i,"key",e.target.value)} placeholder="Rótulo:"/><input className="inp" value={t.val} onChange={e=>u(i,"val",e.target.value)} placeholder="Palpite – Odd X,XX na Casa"/>{tips.length>1&&<button className="btn-x" onClick={()=>setTips(tips.filter((_,j)=>j!==i))}>✕</button>}</div>)}
    <button className="btn btn-ghost" onClick={()=>setTips([...tips,{key:"",val:""}])} style={{marginTop:4,marginBottom:14}}>+ Adicionar</button>
    <label className="lbl preview-lbl">Preview</label>
    <div className="preview-box" style={{padding:0}}><div style={{background:"#e6ffe6",borderLeft:"4px solid #09C400",padding:"16px 20px",borderRadius:"0 6px 6px 0"}}>
      <p style={{fontSize:12,fontWeight:700,textTransform:"uppercase",letterSpacing:1.5,color:"#067a00",margin:"0 0 10px"}}>Palpites Rápidos</p>
      {tips.filter(t=>t.val).map((t,i)=><div key={i} style={{display:"flex",flexWrap:"wrap",gap:"0 6px",fontSize:14,lineHeight:1.9}}><strong>{t.key}</strong><span>{t.val}</span></div>)}
    </div></div>
    <CodeBlock code={html}/>
  </div>;
}

/* Lance Destaque Individual — bloco único com os dois jogadores */
function LancePlayer({p,teamA,teamB}){
  const[homeBg,setHomeBg]=useState("#006847");const[awayBg,setAwayBg]=useState("#FFD100");
  const[nameA,setNameA]=useState("");const[metaA,setMetaA]=useState("");
  const[nameB,setNameB]=useState("");const[metaB,setMetaB]=useState("");
  const[statsA,setStatsA]=useState([{val:"",lbl:""},{val:"",lbl:""},{val:"",lbl:""},{val:"",lbl:""}]);
  const[statsB,setStatsB]=useState([{val:"",lbl:""},{val:"",lbl:""},{val:"",lbl:""},{val:"",lbl:""}]);
  const uA=(i,f,v)=>{const n=[...statsA];n[i]={...n[i],[f]:v};setStatsA(n)};
  const uB=(i,f,v)=>{const n=[...statsB];n[i]={...n[i],[f]:v};setStatsB(n)};
  const sp=`${p}-sp`;
  const renderCard=(bg,label,name,meta,stats)=>{
    const dk=isDk(bg);const txt=dk?"#fff":"#1a1a1a";const mC=dk?"rgba(255,255,255,0.65)":"rgba(0,0,0,0.55)";
    const eC=dk?"rgba(255,255,255,0.6)":"rgba(0,0,0,0.45)";const sBg=dk?"rgba(0,0,0,0.15)":"rgba(0,0,0,0.08)";const lC=dk?"rgba(255,255,255,0.7)":"rgba(0,0,0,0.65)";
    return<div style={{background:bg,borderRadius:10,padding:"18px 16px 14px",maxWidth:680,margin:"0 auto 8px"}}>
      <div style={{fontSize:10,fontWeight:700,letterSpacing:1.6,textTransform:"uppercase",color:eC,marginBottom:6}}>{label}</div>
      <div style={{fontSize:22,fontWeight:700,color:txt,lineHeight:1.15,marginBottom:4}}>{name||"Nome"}</div>
      <div style={{fontSize:12,color:mC,marginBottom:14}}>{meta||"Posição · Clube"}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {stats.filter(s=>s.val).map((s,i)=><div key={i} style={{borderRadius:7,padding:"10px 10px 8px",textAlign:"center",background:sBg}}>
          <div style={{fontSize:22,fontWeight:700,color:txt,lineHeight:1.1,marginBottom:4}}>{s.val}</div>
          <div style={{fontSize:11,color:lC,lineHeight:1.3}}>{s.lbl}</div>
        </div>)}
      </div>
    </div>;
  };
  const cardHTML=(cls,bg,altBg,label,name,meta,stats)=>{
    const dk=isDk(bg);
    return`<div class="${sp} ${sp}-${cls}">
  <div class="${sp}-eye">Jogador destaque · ${label}</div>
  <div class="${sp}-name">${name}</div>
  <div class="${sp}-meta">${meta}</div>
  <div class="${sp}-grid">
${stats.filter(s=>s.val).map(s=>`    <div class="${sp}-stat"><div class="${sp}-val">${s.val}</div><div class="${sp}-lbl">${s.lbl}</div></div>`).join("\n")}
  </div>
</div>`;};
  const html=`<style>
.${sp}{font-family:${FNT};border-radius:10px;padding:18px 16px 14px;max-width:680px;margin:0 auto 12px;display:block!important;visibility:visible!important}
.${sp}-home{background:${homeBg}!important}
.${sp}-away{background:${awayBg}!important}
.${sp}-eye{font-size:10px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:6px}
.${sp}-name{font-size:22px;font-weight:700;color:#fff;line-height:1.15;margin-bottom:4px}
.${sp}-meta{font-size:12px;color:rgba(255,255,255,0.65);margin-bottom:14px}
.${sp}-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.${sp}-stat{border-radius:7px;padding:10px 10px 8px;text-align:center;background:rgba(0,0,0,0.15)}
.${sp}-val{font-size:22px;font-weight:700;color:#fff;line-height:1.1;margin-bottom:4px}
.${sp}-lbl{font-size:11px;color:rgba(255,255,255,0.7);line-height:1.3}
.${sp}-away .${sp}-eye{color:rgba(0,0,0,0.45)!important}
.${sp}-away .${sp}-name{color:#1a1a1a!important}
.${sp}-away .${sp}-meta{color:rgba(0,0,0,0.55)!important}
.${sp}-away .${sp}-stat{background:rgba(0,0,0,0.08)}
.${sp}-away .${sp}-val{color:#1a1a1a!important}
.${sp}-away .${sp}-lbl{color:rgba(0,0,0,0.65)!important}
@media(max-width:480px){.${sp}-name{font-size:18px}.${sp}-val{font-size:18px}.${sp}{padding:14px 12px 12px}}
</style>
${cardHTML("home",homeBg,awayBg,teamA||"[TIME A]",nameA,metaA,statsA)}
${cardHTML("away",awayBg,homeBg,teamB||"[TIME B]",nameB,metaB,statsB)}`;
  return<div>
    <p className="panel-desc">Bloco único com os dois jogadores destaque. Cores dos times clicáveis.</p>
    <ColorPick label={`Cor ${teamA||"Time A"}`} value={homeBg} onChange={setHomeBg}/>
    <ColorPick label={`Cor ${teamB||"Time B"}`} value={awayBg} onChange={setAwayBg}/>
    <hr className="sep"/>
    <div style={{fontSize:13,fontWeight:700,color:homeBg,marginBottom:8}}>▸ {teamA||"Time A"}</div>
    <Field label="Nome do jogador" value={nameA} onChange={setNameA}/>
    <Field label="Posição · Clube" value={metaA} onChange={setMetaA} placeholder="Volante · Fenerbahçe"/>
    <label className="lbl">Stats</label>
    {statsA.map((s,i)=><div key={i} className="grid-row" style={{gridTemplateColumns:"90px 1fr"}}><input className="inp" value={s.val} onChange={e=>uA(i,"val",e.target.value)} placeholder="Valor"/><input className="inp" value={s.lbl} onChange={e=>uA(i,"lbl",e.target.value)} placeholder="Descrição"/></div>)}
    <hr className="sep"/>
    <div style={{fontSize:13,fontWeight:700,color:awayBg,marginBottom:8}}>▸ {teamB||"Time B"}</div>
    <Field label="Nome do jogador" value={nameB} onChange={setNameB}/>
    <Field label="Posição · Clube" value={metaB} onChange={setMetaB} placeholder="Atacante · Flamengo"/>
    <label className="lbl">Stats</label>
    {statsB.map((s,i)=><div key={i} className="grid-row" style={{gridTemplateColumns:"90px 1fr"}}><input className="inp" value={s.val} onChange={e=>uB(i,"val",e.target.value)} placeholder="Valor"/><input className="inp" value={s.lbl} onChange={e=>uB(i,"lbl",e.target.value)} placeholder="Descrição"/></div>)}
    <label className="lbl preview-lbl">Preview</label>
    <div className="preview-box" style={{padding:12,background:"#f0f0f0"}}>
      {renderCard(homeBg,`Jogador destaque · ${teamA||"Time A"}`,nameA,metaA,statsA)}
      {renderCard(awayBg,`Jogador destaque · ${teamB||"Time B"}`,nameB,metaB,statsB)}
    </div>
    <CodeBlock code={html}/>
  </div>;
}

function LancePlacar({p}){
  const[score,setScore]=useState("");const[ctx,setCtx]=useState("");const[ctx2,setCtx2]=useState("");
  const[bullets,setBullets]=useState(["","","",""]);const uB=(i,v)=>{const n=[...bullets];n[i]=v;setBullets(n)};const pw=`${p}-pw`;
  const html=`<style>\n.${pw}{font-family:${FNT};background:#00ba25!important;border-radius:12px;padding:20px 22px 18px;max-width:680px;margin:0 auto;display:block!important;visibility:visible!important}\n.${pw}-eye{font-size:11px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:rgba(255,255,255,0.75);margin-bottom:8px}\n.${pw}-score{font-size:28px;font-weight:700;color:#fff;margin-bottom:16px;line-height:1.2}\n.${pw}-card{background:#fff;border-radius:8px;padding:16px 18px 14px}\n.${pw}-ctx{font-size:13px;color:#333;line-height:1.6;padding-bottom:12px;margin-bottom:12px;border-bottom:1px solid #f0f0f0}\n.${pw}-list{list-style:none;padding:0;margin:0 0 14px}\n.${pw}-list li{font-size:13px;color:#333;line-height:1.6;padding:6px 0 6px 18px;border-bottom:1px solid #f0f0f0;position:relative}\n.${pw}-list li:last-child{border-bottom:none}\n.${pw}-list li::before{content:"\\2022";position:absolute;left:4px;color:#00ba25;font-size:16px;line-height:1.4}\n.${pw}-list li strong{color:#00ba25}\n@media(max-width:480px){.${pw}{padding:16px 16px 14px}.${pw}-score{font-size:22px}.${pw}-ctx,.${pw}-list li{font-size:12px}}\n</style>\n<div class="${pw}">\n  <div class="${pw}-eye">🎯 Palpite do Lance!</div>\n  <div class="${pw}-score">${score}</div>\n  <div class="${pw}-card">\n    <div class="${pw}-ctx">${ctx}${ctx2?`<br><br>${ctx2}`:""}</div>\n    <ul class="${pw}-list">\n${bullets.filter(b=>b).map(b=>`      <li>${b}</li>`).join("\n")}\n    </ul>\n  </div>\n</div>`;
  return<div>
    <p className="panel-desc">Bloco verde de prognóstico. Use <code>&lt;strong&gt;</code> nos bullets para destaque verde.</p>
    <Field label="Placar + Odd" value={score} onChange={setScore} placeholder="Time A 2 x 0 Time B – Odd 7,50 na Casa"/>
    <Field label="Parágrafo 1" value={ctx} onChange={setCtx} rows={2}/>
    <Field label="Parágrafo 2 (opcional)" value={ctx2} onChange={setCtx2} rows={2}/>
    <label className="lbl">Bullets (use &lt;strong&gt; para destaque)</label>
    {bullets.map((b,i)=><div key={i} className="grid-row" style={{gridTemplateColumns:"1fr auto"}}><input className="inp" value={b} onChange={e=>uB(i,e.target.value)} placeholder={`Bullet ${i+1}`}/>{bullets.length>1&&<button className="btn-x" onClick={()=>setBullets(bullets.filter((_,j)=>j!==i))}>✕</button>}</div>)}
    <button className="btn btn-ghost" onClick={()=>setBullets([...bullets,""])} style={{marginTop:4,marginBottom:14}}>+ Bullet</button>
    <label className="lbl preview-lbl">Preview</label>
    <div className="preview-box" style={{padding:0}}><div style={{background:"#00ba25",borderRadius:12,padding:"20px 22px 18px",maxWidth:680,margin:"0 auto"}}>
      <div style={{fontSize:11,fontWeight:700,letterSpacing:1.8,textTransform:"uppercase",color:"rgba(255,255,255,0.75)",marginBottom:8}}>🎯 Palpite do Lance!</div>
      <div style={{fontSize:28,fontWeight:700,color:"#fff",marginBottom:16,lineHeight:1.2}}>{score||"Time A x Time B"}</div>
      <div style={{background:"#fff",borderRadius:8,padding:"16px 18px 14px"}}>
        <div style={{fontSize:13,color:"#333",lineHeight:1.6,paddingBottom:12,marginBottom:12,borderBottom:"1px solid #f0f0f0"}}>{ctx||"Contexto..."}{ctx2&&<><br/><br/>{ctx2}</>}</div>
        <ul style={{listStyle:"none",padding:0,margin:0}}>{bullets.filter(b=>b).map((b,i)=><li key={i} style={{fontSize:13,color:"#333",lineHeight:1.6,padding:"6px 0 6px 18px",borderBottom:i<bullets.filter(x=>x).length-1?"1px solid #f0f0f0":"none",position:"relative"}}><span style={{position:"absolute",left:4,color:"#00ba25",fontSize:16,lineHeight:1.4}}>•</span><span dangerouslySetInnerHTML={{__html:b}}/></li>)}</ul>
      </div>
    </div></div>
    <CodeBlock code={html}/>
  </div>;
}

/* ═══ TRIVELA ═══ */
function TrivelaForm({p,teamA,teamB}){
  const[compName,setCompName]=useState("Copa do Mundo 2026");const mk=()=>["","","","","",""];
  const[compA,setCompA]=useState(mk());const[compB,setCompB]=useState(mk());const[geralA,setGeralA]=useState(mk());const[geralB,setGeralB]=useState(mk());

  const html=`<style>\n.${pe}{font-family:${FNT};max-width:680px;margin:0 auto 24px;border:2px solid #FED937;border-radius:10px;overflow:hidden;display:block!important;visibility:visible!important}\n.${pe}-hdr{background:#FED937;padding:12px 16px;font-size:15px;font-weight:700;color:#000}\n.${pe}-body{padding:16px;background:#f3f4f6}\n.${pe}-score{font-size:22px;font-weight:700;color:#2B2B2B;margin-bottom:4px}\n.${pe}-odd{font-size:13px;color:#666;margin-bottom:6px}\n.${pe}-prob{display:inline-block;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;color:#fff;background:${probC};margin-bottom:14px}\n.${pe}-txt{font-size:14px;color:#333;line-height:1.65}\n.${pe}-txt+.${pe}-txt{margin-top:10px}\n@media(max-width:480px){.${pe}-score{font-size:18px}.${pe}-body{padding:12px}}\n</style>\n<div class="${pe}">\n  <div class="${pe}-hdr">Palpite de placar exato UmDois Esportes: ${teamA||"[A]"} ${sA} x ${sB} ${teamB||"[B]"}</div>\n  <div class="${pe}-body">\n    <div class="${pe}-score">${teamA||"[A]"} ${sA} x ${sB} ${teamB||"[B]"}</div>\n    <div class="${pe}-odd">Odd ${odd} na ${casa}</div>\n    <div class="${pe}-prob">${prob}</div>\n    <p class="${pe}-txt">${p1}</p>\n    ${p2?`<p class="${pe}-txt">${p2}</p>`:""}\n  </div>\n</div>`;
  return<div>
    <p className="panel-desc">Palpite com probabilidade automática pela odd.</p>
    <div className="row row-4"><Field label="Gols A" value={sA} onChange={setSA} placeholder="2"/><Field label="Gols B" value={sB} onChange={setSB} placeholder="1"/><Field label="Odd" value={odd} onChange={setOdd} placeholder="7,80"/><Field label="Casa" value={casa} onChange={setCasa} placeholder="Vbet"/></div>
    {odd&&<div style={{marginBottom:12}}><span className="lbl">Probabilidade: </span><span style={{color:probC,fontWeight:700}}>{prob}</span></div>}
    <Field label="Parágrafo 1" value={p1} onChange={setP1} rows={2}/><Field label="Parágrafo 2 (opcional)" value={p2} onChange={setP2} rows={2}/>

      <div style={{padding:16,background:"#f3f4f6"}}>
        <div style={{fontSize:22,fontWeight:700,marginBottom:4}}>{teamA||"[A]"} {sA} x {sB} {teamB||"[B]"}</div>
        <div style={{fontSize:13,color:"#666",marginBottom:6}}>Odd {odd} na {casa}</div>
        {odd&&<span style={{display:"inline-block",fontSize:12,fontWeight:700,padding:"4px 12px",borderRadius:20,color:"#fff",background:probC,marginBottom:14}}>{prob}</span>}

        {p2&&<p style={{fontSize:14,color:"#333",lineHeight:1.65,marginTop:10}}>{p2}</p>}

  </div>;
}

/* ═══ MAIN ═══ */
const SITE_CFG={
  lance:{name:"Lance!",color:"#09C400",widgets:["Palpites Rápidos","Destaque Individual","Palpite Placar"]},
  trivela:{name:"Trivela",color:"#be0022",widgets:["Retrospecto Recente","Palpite Placar"]},
  umdois:{name:"UmDois",color:"#FED937",widgets:["Resumo Palpites","Raio-X","Você sabia?","Curiosidade","Guia Desempenho","Palpite Placar"]},
  placar:{name:"Placar",color:"#DCFD4E",widgets:["Previsões Rápidas","Raio-X","Curiosidade","Você sabia?","Últimos 5 Jogos","Principais Dicas"]},
};
function App(){
  const[site,setSite]=useState("lance");const[teamA,setTeamA]=useState("");const[teamB,setTeamB]=useState("");const[wIdx,setWIdx]=useState(0);
  const cfg=SITE_CFG[site];const prefix=makePrefix(teamA,teamB);const handleSite=s=>{setSite(s);setWIdx(0)};
  const renderWidget=()=>{const w=cfg.widgets[wIdx]||cfg.widgets[0];const p=prefix;
    switch(site){
      case"lance":if(w==="Palpites Rápidos")return<LancePalpites p={p}/>;if(w==="Destaque Individual")return<LancePlayer p={p} teamA={teamA} teamB={teamB}/>;if(w==="Palpite Placar")return<LancePlacar p={p}/>;break;
      case"trivela":if(w==="Retrospecto Recente")return<TrivelaForm p={p} teamA={teamA} teamB={teamB}/>;if(w==="Palpite Placar")return<TrivPlacar p={p} teamA={teamA} teamB={teamB}/>;break;
      case"umdois":if(w==="Resumo Palpites")return<UDEResumo p={p}/>;if(w==="Raio-X")return<UDERaioX p={p} teamA={teamA} teamB={teamB}/>;if(w==="Você sabia?")return<UDEInsight p={p} emoji="🔍" title="Você sabia?" id="vs"/>;if(w==="Curiosidade")return<UDEInsight p={p} emoji="📈" title="Curiosidade estatística" id="ce"/>;if(w==="Guia Desempenho")return<UDEGuia p={p} teamA={teamA} teamB={teamB}/>;if(w==="Palpite Placar")return<UDEPlacar p={p} teamA={teamA} teamB={teamB}/>;break;
      case"placar":if(w==="Previsões Rápidas")return<PlacarResumo p={p}/>;if(w==="Raio-X")return<PlacarRaioX p={p} teamA={teamA} teamB={teamB}/>;if(w==="Curiosidade")return<PlacarInsight p={p} emoji="📈" title="Curiosidade" id="c"/>;if(w==="Você sabia?")return<PlacarInsight p={p} emoji="🔍" title="Você sabia?" id="vs"/>;if(w==="Últimos 5 Jogos")return<PlacarForm p={p} teamA={teamA} teamB={teamB}/>;if(w==="Principais Dicas")return<PlacarDicas p={p}/>;break;
    }return null;};
  return<div>
    <div className="hdr"><div className="hdr-top"><span className="hdr-brand" style={{color:cfg.color}}>NSN</span><span className="hdr-title">Gerador de Widgets HTML</span></div>
      <div className="site-tabs">{Object.entries(SITE_CFG).map(([k,v])=><button key={k} className={`site-tab${site===k?" on":""}`} style={site===k?{color:v.color,borderBottomColor:v.color}:{}} onClick={()=>handleSite(k)}>{v.name}</button>)}</div>
    </div>
    <div className="main">
      <TeamBar a={teamA} b={teamB} onA={setTeamA} onB={setTeamB} prefix={prefix}/>
      <div className="widget-tabs">{cfg.widgets.map((w,i)=><button key={w} className={`w-tab${wIdx===i?" on":""}`} style={wIdx===i?{background:cfg.color,color:isDk(cfg.color)?"#fff":"#000"}:{}} onClick={()=>setWIdx(i)}>{w}</button>)}</div>
      <div className="panel">{renderWidget()}</div>
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
