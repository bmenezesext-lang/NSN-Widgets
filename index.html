<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NSN — Gerador de Widgets HTML v3</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f4f5f7;--card:#fff;--border:#e0e3e8;--ink:#1a1a1a;--muted:#6b7280;--code-bg:#1e1e2e;--code-txt:#cdd6f4;--radius:10px}
html{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:14px;color:var(--ink);background:var(--bg)}
body{min-height:100vh}
.hdr{background:#fff;border-bottom:1px solid var(--border);padding:14px 20px 0;position:sticky;top:0;z-index:50}
.hdr-top{display:flex;align-items:baseline;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.hdr-brand{font-size:18px;font-weight:800;letter-spacing:-.5px}
.hdr-title{font-size:14px;font-weight:600}
.site-tabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none}.site-tabs::-webkit-scrollbar{display:none}
.site-tab{padding:10px 18px;border:none;cursor:pointer;font-size:12.5px;font-weight:600;white-space:nowrap;border-bottom:3px solid transparent;border-radius:8px 8px 0 0;transition:all .15s;background:transparent;color:var(--muted)}.site-tab:hover{background:#f0f0f0}.site-tab.on{border-bottom-color:currentColor}
.main{max-width:860px;margin:0 auto;padding:20px 14px 60px}
.team-bar{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:14px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;align-items:end}
.prefix-display{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;padding:9px 12px;background:#f4f5f7;border-radius:8px;text-align:center;border:1px dashed var(--border)}
.widget-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px}
.w-tab{padding:7px 13px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-size:12px;font-weight:500;background:#fff;color:var(--muted);transition:all .12s}.w-tab:hover{border-color:#aaa}.w-tab.on{font-weight:700;color:#fff;border-color:transparent}
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 16px}
.panel-desc{font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.5}
.lbl{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px;letter-spacing:.4px;text-transform:uppercase}
.inp{width:100%;padding:8px 11px;border-radius:8px;border:1px solid var(--border);font-size:13px;font-family:inherit;background:#fafbfc;outline:none;transition:border .15s}.inp:focus{border-color:#888}
textarea.inp{resize:vertical}
.field{margin-bottom:11px}
.row{display:grid;gap:10px}.row-2{grid-template-columns:1fr 1fr}.row-3{grid-template-columns:1fr 1fr 1fr}.row-4{grid-template-columns:1fr 1fr 1fr 1fr}
.btn{padding:8px 18px;border-radius:8px;border:none;font-weight:700;font-size:13px;cursor:pointer;transition:all .15s}
.btn-copy{background:#222;color:#fff}.btn-copy:hover{background:#000}.btn-copy.ok{background:#067a00}
.btn-ghost{background:transparent;border:1px dashed var(--border);color:var(--ink);font-weight:600;font-size:12px}.btn-ghost:hover{border-color:#888}
.btn-x{background:#fee;color:#c00;padding:7px 9px;border-radius:6px;border:none;cursor:pointer;font-size:12px}
.colors{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.color-dot{width:30px;height:30px;border-radius:8px;cursor:pointer;border:3px solid transparent;transition:all .12s}.color-dot:hover{transform:scale(1.1)}.color-dot.on{border-color:var(--ink);box-shadow:0 0 0 2px #fff,0 0 0 4px var(--ink)}
.code-wrap{margin-top:14px}.code-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.code-pre{background:var(--code-bg);color:var(--code-txt);padding:12px;border-radius:var(--radius);font-size:11px;line-height:1.5;overflow:auto;max-height:280px;white-space:pre-wrap;word-break:break-all;font-family:'SF Mono',Monaco,Consolas,monospace}
.preview-lbl{margin:12px 0 6px}
.preview-box{border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:4px;background:#fafbfc;overflow:hidden}
.grid-row{display:grid;gap:8px;margin-bottom:7px}
.sep{border:none;border-top:1px solid var(--border);margin:14px 0}
.pill{padding:6px 12px;border-radius:7px;border:1px solid var(--border);cursor:pointer;font-size:12px;font-weight:500;background:#fff;color:var(--muted);transition:all .12s}.pill:hover{border-color:#888}.pill.on{color:#fff;border-color:transparent;font-weight:700}
.win-sel{display:flex;gap:2px}.win-btn{width:24px;height:24px;border-radius:4px;border:1px solid var(--border);cursor:pointer;font-size:10px;font-weight:700;background:#fff;color:var(--muted);display:flex;align-items:center;justify-content:center}.win-btn.on-a{background:#FED937;color:#000;border-color:#FED937}.win-btn.on-b{background:#FED937;color:#000;border-color:#FED937}
@media(max-width:600px){.main{padding:12px 8px 40px}.panel{padding:14px 10px}.team-bar{grid-template-columns:1fr}.row-2,.row-3,.row-4{grid-template-columns:1fr}.site-tab{padding:8px 12px;font-size:11.5px}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.5/babel.min.js"></script>
<script type="text/babel">
const{useState}=React;
const strip=s=>s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z]/gi,"").toLowerCase();
const mkPfx=(a,b)=>(strip(a).slice(0,3)+strip(b).slice(0,3))||"prefix";
const FNT="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif";
const TC=[{n:"Vermelho",h:"#c0392b"},{n:"Azul",h:"#2980b9"},{n:"Azul Esc",h:"#1a1a4e"},{n:"Verde",h:"#006847"},{n:"Amarelo",h:"#FFD100"},{n:"Laranja",h:"#e67e22"},{n:"Rosa",h:"#F8C8DC"},{n:"Preto",h:"#1a1a1a"},{n:"Grená",h:"#800020"},{n:"Celeste",h:"#6CABDD"}];
const isDk=h=>{if(!h||h.length<7)return true;const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return(r*299+g*587+b*114)/1000<140};
const oddPct=raw=>{const o=parseFloat((raw||"0").replace(",","."));return o>0?Math.round((1/o)*100):0};

function Field({label,value,onChange,placeholder,rows,style}){return<div className="field" style={style}><label className="lbl">{label}</label>{rows?<textarea className="inp" rows={rows} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}/>:<input className="inp" value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}/>}</div>}
function CopyBtn({text}){const[ok,set]=useState(false);return<button className={`btn btn-copy${ok?" ok":""}`} onClick={()=>{navigator.clipboard.writeText(text);set(true);setTimeout(()=>set(false),2000)}}>{ok?"✓ Copiado":"Copiar HTML"}</button>}
function CodeBlock({code}){return<div className="code-wrap"><div className="code-head"><span className="lbl" style={{margin:0}}>HTML gerado</span><CopyBtn text={code}/></div><pre className="code-pre">{code}</pre></div>}
function TeamBar({a,b,onA,onB,pfx}){return<div className="team-bar"><Field label="Time A (casa)" value={a} onChange={onA} placeholder="Corinthians"/><Field label="Time B (fora)" value={b} onChange={onB} placeholder="Palmeiras"/><div><label className="lbl">Prefixo</label><div className="prefix-display">{pfx}</div></div></div>}
function ColorPick({label,value,onChange}){return<div className="field"><label className="lbl">{label}</label><div className="colors">{TC.map(c=><div key={c.h} className={`color-dot${value===c.h?" on":""}`} style={{background:c.h}} title={c.n} onClick={()=>onChange(c.h)}/>)}<input className="inp" value={value} onChange={e=>onChange(e.target.value)} style={{width:80,marginLeft:4}} placeholder="#hex"/></div></div>}

/* ═══ 1. PALPITES (multi-site) ═══ */
const PS={lance:{name:"Lance!",color:"#09C400",txtH:"#fff",icon:"⚽"},trivela:{name:"Trivela",color:"#be0022",txtH:"#fff",icon:"⚽"},umdois:{name:"UmDois",color:"#FED937",txtH:"#000",icon:"⚽"}};
function Palpites({teamA,teamB,pfx}){
  const[site,setSite]=useState("lance");const[count,setCount]=useState(3);
  const[tips,setTips]=useState([{name:"",odds:""},{name:"",odds:""},{name:"",odds:""}]);
  const uT=(i,f,v)=>{const n=[...tips];n[i]={...n[i],[f]:v};setTips(n)};
  const adj=c=>{setCount(c);const n=[...tips];while(n.length<c)n.push({name:"",odds:""});setTips(n.slice(0,c))};
  const s=PS[site];const tp=`${pfx}-tip`;const filled=tips.slice(0,count).filter(t=>t.name&&t.odds);
  const html=`<style>\n.${tp}{font-family:${FNT};max-width:680px;margin:0 auto 24px;border-radius:10px;overflow:hidden;border:2px solid ${s.color};display:block!important;visibility:visible!important}\n.${tp}-hdr{background:${s.color};padding:12px 16px;font-size:14px;font-weight:700;color:${s.txtH};text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:8px}\n.${tp}-sub{display:flex;justify-content:space-between;padding:8px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#888;border-bottom:1px solid #eee}\n.${tp}-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #f0f0f0}\n.${tp}-row:last-child{border-bottom:none}\n.${tp}-name{flex:1;font-size:14px;font-weight:500;color:#333}\n.${tp}-pct{font-size:14px;font-weight:700;color:#333;min-width:40px;text-align:right}\n.${tp}-bar{width:80px;height:8px;background:#e0e0e0;border-radius:4px;overflow:hidden;flex-shrink:0}\n.${tp}-fill{height:100%;background:${s.color};border-radius:4px}\n@media(max-width:480px){.${tp}-row{gap:8px;padding:10px 14px}.${tp}-name{font-size:13px}.${tp}-bar{width:60px}.${tp}-hdr{font-size:12px}}\n</style>\n<div class="${tp}">\n  <div class="${tp}-hdr">${s.icon} Palpites para ${teamA||"Time A"} x ${teamB||"Time B"}</div>\n  <div class="${tp}-sub"><span>Palpite</span><span>Probabilidade estimada</span></div>\n${filled.map(t=>{const pct=oddPct(t.odds);return`  <div class="${tp}-row"><div class="${tp}-name">${t.name}</div><div class="${tp}-pct">${pct}%</div><div class="${tp}-bar"><div class="${tp}-fill" style="width:${pct}%"></div></div></div>`}).join("\n")}\n</div>`;
  return<div>
    <p className="panel-desc">Card de palpites. Odd média → probabilidade automática.</p>
    <div className="field"><label className="lbl">Site</label><div style={{display:"flex",gap:4}}>{Object.entries(PS).map(([k,v])=><button key={k} className={`pill${site===k?" on":""}`} style={site===k?{background:v.color,color:v.txtH}:{}} onClick={()=>setSite(k)}>{v.name}</button>)}</div></div>
    <div className="field"><label className="lbl">Nº de palpites</label><div style={{display:"flex",gap:4}}>{[1,2,3].map(n=><button key={n} className={`pill${count===n?" on":""}`} style={count===n?{background:s.color,color:s.txtH}:{}} onClick={()=>adj(n)}>{n}</button>)}</div></div>
    {tips.slice(0,count).map((t,i)=><div key={i} className="grid-row" style={{gridTemplateColumns:"1fr 100px"}}><input className="inp" value={t.name} onChange={e=>uT(i,"name",e.target.value)} placeholder={["Vitória do Corinthians","Menos de 2,5 gols","Ambos marcam"][i]||`Palpite ${i+1}`}/><input className="inp" value={t.odds} onChange={e=>uT(i,"odds",e.target.value)} placeholder="Odd média"/></div>)}
    <label className="lbl preview-lbl">Preview</label>
    <div className="preview-box" style={{padding:0}}>
      <div style={{background:s.color,padding:"12px 16px",fontSize:14,fontWeight:700,color:s.txtH,textTransform:"uppercase",letterSpacing:.8,display:"flex",alignItems:"center",gap:8}}>{s.icon} Palpites para {teamA||"Time A"} x {teamB||"Time B"}</div>
      <div style={{display:"flex",justifyContent:"space-between",padding:"8px 16px",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:.6,color:"#888",borderBottom:"1px solid #eee"}}><span>Palpite</span><span>Probabilidade estimada</span></div>
      {filled.map((t,i)=>{const pct=oddPct(t.odds);return<div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderBottom:i<filled.length-1?"1px solid #f0f0f0":"none"}}><div style={{flex:1,fontSize:14,fontWeight:500,color:"#333"}}>{t.name}</div><div style={{fontSize:14,fontWeight:700,color:"#333",minWidth:40,textAlign:"right"}}>{pct}%</div><div style={{width:80,height:8,background:"#e0e0e0",borderRadius:4,overflow:"hidden",flexShrink:0}}><div style={{height:"100%",width:`${pct}%`,background:s.color,borderRadius:4}}/></div></div>})}
    </div>
    <CodeBlock code={html}/>
  </div>;
}

/* ═══ 2. LANCE — Destaque Individual (dynamic text colors both cards) + Palpite Placar ═══ */
function LancePlayer({p,teamA,teamB}){
  const[homeBg,setHomeBg]=useState("#1a1a4e");const[awayBg,setAwayBg]=useState("#c0392b");
  const[nA,setNA]=useState("");const[infoA,setInfoA]=useState("");
  const[nB,setNB]=useState("");const[infoB,setInfoB]=useState("");
  const[sA,setSA]=useState([{v:"",l:""},{v:"",l:""},{v:"",l:""},{v:"",l:""}]);
  const[sB,setSB]=useState([{v:"",l:""},{v:"",l:""},{v:"",l:""},{v:"",l:""}]);
  const uA=(i,f,val)=>{const n=[...sA];n[i]={...n[i],[f]:val};setSA(n)};
  const uB=(i,f,val)=>{const n=[...sB];n[i]={...n[i],[f]:val};setSB(n)};
  const sp=`${p}-sp`;
  /* Dynamic color helpers for both cards */
  const hDk=isDk(homeBg);const aDk=isDk(awayBg);
  const hTxt=hDk?"#fff":"#1a1a1a";const aTxt=aDk?"#fff":"#1a1a1a";
  const hEye=hDk?"rgba(255,255,255,0.6)":"rgba(0,0,0,0.45)";const aEye=aDk?"rgba(255,255,255,0.6)":"rgba(0,0,0,0.45)";
  const hMeta=hDk?"rgba(255,255,255,0.65)":"rgba(0,0,0,0.55)";const aMeta=aDk?"rgba(255,255,255,0.65)":"rgba(0,0,0,0.55)";
  const hSBg=hDk?"rgba(0,0,0,0.15)":"rgba(0,0,0,0.08)";const aSBg=aDk?"rgba(0,0,0,0.15)":"rgba(0,0,0,0.08)";
  const hLbl=hDk?"rgba(255,255,255,0.7)":"rgba(0,0,0,0.65)";const aLbl=aDk?"rgba(255,255,255,0.7)":"rgba(0,0,0,0.65)";

  const cardPrev=(bg,label,name,info,stats,dk,txt,eye,meta,sbg,lbl)=><div style={{background:bg,borderRadius:10,padding:"20px 18px 16px",maxWidth:680,margin:"0 auto 10px"}}>
      <div style={{fontSize:10,fontWeight:700,letterSpacing:1.6,textTransform:"uppercase",color:eye,marginBottom:6}}>{label}</div>
      <div style={{fontSize:22,fontWeight:700,color:txt,lineHeight:1.15,marginBottom:4}}>{name||"Nome"}</div>
      <div style={{fontSize:12,color:meta,marginBottom:14}}>{info||"Idade · Posição · Clube"}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {stats.filter(s=>s.v).map((s,i)=><div key={i} style={{borderRadius:7,padding:"12px 10px 10px",textAlign:"center",background:sbg}}>
          <div style={{fontSize:22,fontWeight:700,color:txt,lineHeight:1.1,marginBottom:4}}>{s.v}</div>
          <div style={{fontSize:11,color:lbl,lineHeight:1.3}}>{s.l}</div>
        </div>)}
      </div>
    </div>;

  const html=`<style>
.${sp}{font-family:${FNT};border-radius:10px;padding:20px 18px 16px;max-width:680px;margin:0 auto 12px;display:block!important;visibility:visible!important}
.${sp}-home{background:${homeBg}!important}
.${sp}-away{background:${awayBg}!important}
.${sp}-home .${sp}-eye{color:${hEye}}
.${sp}-home .${sp}-name{color:${hTxt}}
.${sp}-home .${sp}-meta{color:${hMeta}}
.${sp}-home .${sp}-stat{background:${hSBg}}
.${sp}-home .${sp}-val{color:${hTxt}}
.${sp}-home .${sp}-lbl{color:${hLbl}}
.${sp}-away .${sp}-eye{color:${aEye}}
.${sp}-away .${sp}-name{color:${aTxt}}
.${sp}-away .${sp}-meta{color:${aMeta}}
.${sp}-away .${sp}-stat{background:${aSBg}}
.${sp}-away .${sp}-val{color:${aTxt}}
.${sp}-away .${sp}-lbl{color:${aLbl}}
.${sp}-eye{font-size:10px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;margin-bottom:6px}
.${sp}-name{font-size:22px;font-weight:700;line-height:1.15;margin-bottom:4px}
.${sp}-meta{font-size:12px;margin-bottom:14px}
.${sp}-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.${sp}-stat{border-radius:7px;padding:12px 10px 10px;text-align:center}
.${sp}-val{font-size:22px;font-weight:700;line-height:1.1;margin-bottom:4px}
.${sp}-lbl{font-size:11px;line-height:1.3}
@media(max-width:480px){.${sp}-name{font-size:18px}.${sp}-val{font-size:18px}.${sp}{padding:16px 14px 12px}}
</style>
<div class="${sp} ${sp}-home">
  <div class="${sp}-eye">Jogador destaque · ${teamA||"[TIME A]"}</div>
  <div class="${sp}-name">${nA}</div>
  <div class="${sp}-meta">${infoA}</div>
  <div class="${sp}-grid">
${sA.filter(s=>s.v).map(s=>`    <div class="${sp}-stat"><div class="${sp}-val">${s.v}</div><div class="${sp}-lbl">${s.l}</div></div>`).join("\n")}
  </div>
</div>
<div class="${sp} ${sp}-away">
  <div class="${sp}-eye">Jogador destaque · ${teamB||"[TIME B]"}</div>
  <div class="${sp}-name">${nB}</div>
  <div class="${sp}-meta">${infoB}</div>
  <div class="${sp}-grid">
${sB.filter(s=>s.v).map(s=>`    <div class="${sp}-stat"><div class="${sp}-val">${s.v}</div><div class="${sp}-lbl">${s.l}</div></div>`).join("\n")}
  </div>
</div>`;

  return<div>
    <p className="panel-desc">Bloco único com dois jogadores. Cores de texto adaptam ao fundo automaticamente.</p>
    <ColorPick label={`Cor ${teamA||"Time A"}`} value={homeBg} onChange={setHomeBg}/>
    <ColorPick label={`Cor ${teamB||"Time B"}`} value={awayBg} onChange={setAwayBg}/>
    <hr className="sep"/>
    <div style={{fontSize:13,fontWeight:700,color:hDk?homeBg:"#333",marginBottom:6}}>▸ {teamA||"Time A"}</div>
    <Field label="Nome" value={nA} onChange={setNA} placeholder="Kylian Mbappé"/>
    <Field label="Idade · Posição · Clube" value={infoA} onChange={setInfoA} placeholder="Atacante/Real Madrid"/>
    <label className="lbl">Stats</label>
    {sA.map((s,i)=><div key={i} className="grid-row" style={{gridTemplateColumns:"80px 1fr"}}><input className="inp" value={s.v} onChange={e=>uA(i,"v",e.target.value)} placeholder="Valor"/><input className="inp" value={s.l} onChange={e=>uA(i,"l",e.target.value)} placeholder="Descrição"/></div>)}
    <hr className="sep"/>
    <div style={{fontSize:13,fontWeight:700,color:aDk?awayBg:"#333",marginBottom:6}}>▸ {teamB||"Time B"}</div>
    <Field label="Nome" value={nB} onChange={setNB} placeholder="Achraf Hakimi"/>
    <Field label="Idade · Posição · Clube" value={infoB} onChange={setInfoB} placeholder="Lateral direito/PSG"/>
    <label className="lbl">Stats</label>
    {sB.map((s,i)=><div key={i} className="grid-row" style={{gridTemplateColumns:"80px 1fr"}}><input className="inp" value={s.v} onChange={e=>uB(i,"v",e.target.value)} placeholder="Valor"/><input className="inp" value={s.l} onChange={e=>uB(i,"l",e.target.value)} placeholder="Descrição"/></div>)}
    <label className="lbl preview-lbl">Preview</label>
    <div className="preview-box" style={{padding:10,background:"#eee"}}>
      {cardPrev(homeBg,`Jogador destaque · ${teamA||"Time A"}`,nA,infoA,sA,hDk,hTxt,hEye,hMeta,hSBg,hLbl)}
      {cardPrev(awayBg,`Jogador destaque · ${teamB||"Time B"}`,nB,infoB,sB,aDk,aTxt,aEye,aMeta,aSBg,aLbl)}
    </div>
    <CodeBlock code={html}/>
  </div>;
}

function LancePlacar({p}){
  const[score,setScore]=useState("");const[c1,setC1]=useState("");const[c2,setC2]=useState("");
  const[bullets,setBullets]=useState(["","",""]);const uB=(i,v)=>{const n=[...bullets];n[i]=v;setBullets(n)};
  const pw=`${p}-pw`;
  /* Use <b> instead of <strong> for green highlights — WordPress handles <b> more reliably */
  const html=`<style>
.${pw}{font-family:${FNT};background:#00ba25!important;border-radius:12px;padding:18px 20px 16px;max-width:680px;margin:0 auto;display:block!important;visibility:visible!important}
.${pw}-eye{font-size:11px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:rgba(255,255,255,0.75);margin-bottom:7px}
.${pw}-score{font-size:26px;font-weight:700;color:#fff;margin-bottom:14px;line-height:1.2}
.${pw}-card{background:#fff;border-radius:8px;padding:14px 16px 12px}
.${pw}-ctx{font-size:13px;color:#333;line-height:1.6;padding-bottom:10px;margin-bottom:10px;border-bottom:1px solid #f0f0f0}

function UDEPlacar({p,teamA,teamB}){

        <p style={{fontSize:14,color:"#333",lineHeight:1.65}}>{p1||"..."}</p>
        {p2&&<p style={{fontSize:14,color:"#333",lineHeight:1.65,marginTop:10}}>{p2}</p>}
        {p3&&<p style={{fontSize:14,color:"#333",lineHeight:1.65,marginTop:10}}>{p3}</p>}
      </div>
    </div>
    <CodeBlock code={html}/>
  </div>;
}

/* ═══ MAIN ═══ */
const SITE_CFG={
  palpites:{name:"⚽ Palpites",color:"#09C400",widgets:["Card de Palpites"]},
  lance:{name:"Lance!",color:"#09C400",widgets:["Destaque Individual","Palpite Placar"]},
  trivela:{name:"Trivela",color:"#be0022",widgets:["Retrospecto","Palpite Placar"]},
  umdois:{name:"UmDois",color:"#FED937",widgets:["Raio-X","Guia Desempenho","Você sabia?","Curiosidade","Placar Exato"]},
  lakers:{name:"Lakers Brasil",color:"#552583",widgets:["Comparar Jogadores","Comparar Times"]},
};
function App(){
  const[site,setSite]=useState("palpites");const[teamA,setTeamA]=useState("");const[teamB,setTeamB]=useState("");const[wIdx,setWIdx]=useState(0);
  const cfg=SITE_CFG[site];const pfx=mkPfx(teamA,teamB);const handleSite=s=>{setSite(s);setWIdx(0)};
  const isNBA=site==="lakers";
  const renderWidget=()=>{const w=cfg.widgets[wIdx]||cfg.widgets[0];
    switch(site){
      case"palpites":return<Palpites teamA={teamA} teamB={teamB} pfx={pfx}/>;
      case"lance":if(w==="Destaque Individual")return<LancePlayer p={pfx} teamA={teamA} teamB={teamB}/>;if(w==="Palpite Placar")return<LancePlacar p={pfx}/>;break;
      case"trivela":if(w==="Retrospecto")return<TrivelaForm p={pfx} teamA={teamA} teamB={teamB}/>;if(w==="Palpite Placar")return<TrivPlacar p={pfx} teamA={teamA} teamB={teamB}/>;break;
      case"umdois":if(w==="Raio-X")return<UDERaioX p={pfx} teamA={teamA} teamB={teamB}/>;if(w==="Guia Desempenho")return<UDEGuia p={pfx} teamA={teamA} teamB={teamB}/>;if(w==="Você sabia?")return<UDEInsight p={pfx} emoji="🔍" title="Você sabia?" id="vs"/>;if(w==="Curiosidade")return<UDEInsight p={pfx} emoji="📈" title="Curiosidade estatística" id="ce"/>;if(w==="Placar Exato")return<UDEPlacar p={pfx} teamA={teamA} teamB={teamB}/>;break;
      case"lakers":if(w==="Comparar Jogadores")return<LakersPlayers pfx={pfx}/>;if(w==="Comparar Times")return<LakersTeams pfx={pfx}/>;break;
    }return null;};
  return<div>
    <div className="hdr"><div className="hdr-top"><span className="hdr-brand" style={{color:cfg.color}}>NSN</span><span className="hdr-title">Gerador de Widgets HTML</span></div>
      <div className="site-tabs">{Object.entries(SITE_CFG).map(([k,v])=><button key={k} className={`site-tab${site===k?" on":""}`} style={site===k?{color:v.color,borderBottomColor:v.color}:{}} onClick={()=>handleSite(k)}>{v.name}</button>)}</div>
    </div>
    <div className="main">
      {!isNBA&&<TeamBar a={teamA} b={teamB} onA={setTeamA} onB={setTeamB} pfx={pfx}/>}
      {cfg.widgets.length>1&&<div className="widget-tabs">{cfg.widgets.map((w,i)=><button key={w} className={`w-tab${wIdx===i?" on":""}`} style={wIdx===i?{background:cfg.color,color:isDk(cfg.color)?"#fff":"#000"}:{}} onClick={()=>setWIdx(i)}>{w}</button>)}</div>}
      <div className="panel">{renderWidget()}</div>
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
